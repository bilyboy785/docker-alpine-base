name: build-push-docker-image

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    strategy:
      fail-fast: false
      matrix:
        alpine_tag: [ "3.24", "3.23", "3.22", "3.21", "3.20", "3.19"]
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build date
        id: date
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image name
        id: names
        run: |
          echo "ghcr=ghcr.io/${{ github.repository_owner }}/alpine-base" >> $GITHUB_OUTPUT

      - name: Docker metadata (only <version> tags)
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            ${{ steps.names.outputs.ghcr }}
          tags: |
            type=raw,value=${{ matrix.alpine_tag }}
          annotations: |
            org.opencontainers.image.title=alpine-base
            org.opencontainers.image.description=Base Alpine image for multi purposes
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ matrix.alpine_tag }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            ALPINE_TAG=${{ matrix.alpine_tag }}
            BUILD_DATE=${{ steps.date.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max